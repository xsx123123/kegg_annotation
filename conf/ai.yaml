# -----------------------------------------------------------------------------
# AI 分析配置（可选）
# -----------------------------------------------------------------------------
# 使用 AI 对注释结果进行智能分析和解读
# 默认使用本地 Ollama，也可配置 OpenAI 或 Claude
ai:
  enabled: true              # 是否启用 AI 分析
  provider: "openai"          # 可选: ollama, openai, claude
  model: "glm-4.7"           # 模型名称
  api_key: ARK_API_KEY        # API 密钥（建议通过环境变量 AI_API_KEY 设置）
  api_base: "https://dashscope.aliyuncs.com/compatible-mode/v1"  # 自定义 API 端点（如 http://localhost:11434）