# =============================================================================
# KEGG Annotation Pipeline - 通用分析参数配置
# =============================================================================

# -----------------------------------------------------------------------------
# 执行环境配置
# -----------------------------------------------------------------------------
execution:
  environment: local   # local 或 cluster
  queue: normal        # 集群队列/分区名称

# -----------------------------------------------------------------------------
# 资源配置预设
# -----------------------------------------------------------------------------
resource_presets:
  default:
    mem_gb: 8
    runtime: 60        # 分钟
  high_resource:
    mem_gb: 32
    runtime: 240
  low_resource:
    mem_gb: 4
    runtime: 30

# -----------------------------------------------------------------------------
# 路径配置
# -----------------------------------------------------------------------------

# 数据根目录 - 所有数据库路径的基准目录
# 可以是绝对路径或相对于 pipeline 根目录的路径
dataset_dir: /data/jzhang/reference/kegg_annotation

# 输入/输出目录
input_dir: "test"           # 输入序列目录
output_dir: "results"       # 输出结果目录

# -----------------------------------------------------------------------------
# Conda 环境配置
# -----------------------------------------------------------------------------
env_dir: "env"
eggnog_env: "env/eggnog-mapper.yaml"
kofam_env: "env/kofamscan.yaml"
python3_env: "env/python3.yaml"

# -----------------------------------------------------------------------------
# 脚本路径配置
# -----------------------------------------------------------------------------
# 所有处理脚本的相对路径（相对于 pipeline 根目录）
scripts:
  eggnog_processor: "scripts/eggnog_processor.py"
  KofamScan_processor: "scripts/KofamScan_processor.py"
  merge_results: "scripts/merge_results.py"
  ai_curator: "scripts/ai_curator.py"

# -----------------------------------------------------------------------------
# 数据库路径配置
# -----------------------------------------------------------------------------
# 以下路径是相对于 dataset_dir 的相对路径
# 如果已经是绝对路径，则直接使用

eggnog_data_dir: "dataset/eggnog-mapper"          # EggNOG 数据库目录
kofam_ko_list: "dataset/kegg_2026-02-01_ko_dataset/ko_list"    # Kofam KO 列表
kofam_profiles: "dataset/kegg_2026-02-01_ko_dataset/profiles"  # Kofam profiles 目录

# -----------------------------------------------------------------------------
# CPU 资源配置
# -----------------------------------------------------------------------------
eggnog_cpu: 8      # eggnog-mapper 使用的线程数
kofam_cpu: 8       # KofamScan 使用的线程数

# -----------------------------------------------------------------------------
# AI 分析配置（可选）
# -----------------------------------------------------------------------------
# 使用 AI 对注释结果进行智能分析和解读
# 默认使用本地 Ollama，也可配置 OpenAI、Claude 或阿里云等兼容 OpenAI 格式的服务
# 
# ⚠️  安全警告：API 密钥安全
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 1. 绝对不要提交真实 API key 到 Git 仓库！
# 2. 绝对不要在命令行参数中传递 API key（会被记录在 shell 历史和进程列表）
# 3. 绝对不要在日志文件中打印 API key
# 
# 推荐做法：
#   export AI_API_KEY="sk-your-key"   # 在 shell 中设置环境变量
#   然后在下方配置: api_key: "AI_API_KEY"  # 只写变量名，不写真实 key
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

ai:
  enabled: false              # 是否启用 AI 分析
  provider: "ollama"          # 可选: ollama, openai, claude
  model: "llama3.2"           # 模型名称
  
  # 物种分类信息（用于 AI 判断注释的物种合理性，避免跨域错误注释）
  # 示例: "Bacteria;Firmicutes;Bacillales"
  # 示例: "Viridiplantae;Streptophyta;Embryophyta" （植物）
  # taxonomy: "Unknown"
  
  # AI 评估策略
  # max_proteins: 50           # 最大评估蛋白数（默认 50）
  # no_auto_filter: false      # true = 所有蛋白都送 AI；false = 仅模糊区域送 AI
  
  # API 密钥配置（🔒 安全方式 - 使用环境变量名）：
  # 正确做法 ✅: 只写环境变量名，真实 key 通过 export 设置
  # api_key: "AI_API_KEY"      # 脚本会读取 $AI_API_KEY 环境变量
  # api_key: "ARK_API_KEY"     # 或使用其他名称，如阿里云的 ARK_API_KEY
  #
  # 错误做法 ❌: 永远不要这样写！
  # api_key: "sk-actual-secret-key-here"
  # 
  # API 端点配置：
  # 支持直接 URL 或环境变量名（如阿里云的 DASHSCOPE_API_BASE）
  # api_base: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  # api_base: "https://api.openai.com/v1"
  # api_base: "http://localhost:11434"  # Ollama 本地

# -----------------------------------------------------------------------------
# 过滤阈值配置
# -----------------------------------------------------------------------------
evalue_threshold: 1.0e-5      # E-value 阈值（越小越严格）
bitscore_threshold: 60        # Bit-score 阈值（越大越严格）
min_confidence: "High"        # 最低可信度: High, Medium, Low
require_kegg: true            # 是否要求必须有 KEGG 注释
require_go: false             # 是否要求必须有 GO 注释

# -----------------------------------------------------------------------------
# 样本配置
# -----------------------------------------------------------------------------
# 要分析的样本列表
samples:
  - test_sample_100
  # - sample2
  # - sample3
