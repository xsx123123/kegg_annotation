# =============================================================================
# KEGG Annotation Pipeline - 通用分析参数配置
# =============================================================================
# 此文件包含所有分析参数配置，适用于所有样本
# 修改此文件将改变所有分析的默认行为
# 
# 样本特定配置（samples, workflow, input_dir, output_dir）通过 
# --config analysisyaml=/path/to/config.yaml 参数传入
# =============================================================================

# -----------------------------------------------------------------------------
# 执行环境配置
# -----------------------------------------------------------------------------
execution:
  environment: local   # local 或 cluster
  queue: normal        # 集群队列/分区名称

# -----------------------------------------------------------------------------
# 资源配置预设
# -----------------------------------------------------------------------------
resource_presets:
  default:
    mem_gb: 8
    runtime: 60        # 分钟
  high_resource:
    mem_gb: 32
    runtime: 240
  low_resource:
    mem_gb: 4
    runtime: 30

# -----------------------------------------------------------------------------
# Conda 环境配置
# -----------------------------------------------------------------------------
env_dir: "env"
eggnog_env: "env/eggnog-mapper.yaml"
kofam_env: "env/kofamscan.yaml"

# -----------------------------------------------------------------------------
# eggnog-mapper 配置
# -----------------------------------------------------------------------------
eggnog_data_dir: "../dataset/eggnog-mapper"
eggnog_cpu: 8

# -----------------------------------------------------------------------------
# KofamScan 配置
# -----------------------------------------------------------------------------
kofam_ko_list: "../dataset/kegg_2026-02-01_ko_dataset/ko_list"
kofam_profiles: "../dataset/kegg_2026-02-01_ko_dataset/profiles"
kofam_cpu: 8

# -----------------------------------------------------------------------------
# 过滤阈值配置
# -----------------------------------------------------------------------------
evalue_threshold: 1.0e-5
bitscore_threshold: 60
min_confidence: "High"    # High, Medium, 或 Low
require_kegg: true
require_go: false
