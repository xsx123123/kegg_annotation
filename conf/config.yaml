# =============================================================================
# KEGG Annotation Pipeline - 通用分析参数配置
# =============================================================================

# -----------------------------------------------------------------------------
# 执行环境配置
# -----------------------------------------------------------------------------
execution:
  environment: local   # local 或 cluster
  queue: normal        # 集群队列/分区名称

# -----------------------------------------------------------------------------
# 资源配置预设
# -----------------------------------------------------------------------------
resource_presets:
  default:
    mem_gb: 8
    runtime: 60        # 分钟
  high_resource:
    mem_gb: 32
    runtime: 240
  low_resource:
    mem_gb: 4
    runtime: 30

# -----------------------------------------------------------------------------
# 路径配置
# -----------------------------------------------------------------------------

# 数据根目录 - 所有数据库路径的基准目录
# 可以是绝对路径或相对于 pipeline 根目录的路径
dataset_dir: /home/zj/pipeline/kegg_annotation

# 输入/输出目录
input_dir: "test"           # 输入序列目录
output_dir: "results"       # 输出结果目录

# -----------------------------------------------------------------------------
# Conda 环境配置
# -----------------------------------------------------------------------------
env_dir: "env"
eggnog_env: "env/eggnog-mapper.yaml"
kofam_env: "env/kofamscan.yaml"
python3_env: "env/python3.yaml"

# -----------------------------------------------------------------------------
# 脚本路径配置
# -----------------------------------------------------------------------------
# 所有处理脚本的相对路径（相对于 pipeline 根目录）
scripts:
  eggnog_processor: "scripts/eggnog_processor.py"
  KofamScan_processor: "scripts/KofamScan_processor.py"
  merge_results: "scripts/merge_results.py"

# -----------------------------------------------------------------------------
# 数据库路径配置
# -----------------------------------------------------------------------------
# 以下路径是相对于 dataset_dir 的相对路径
# 如果已经是绝对路径，则直接使用

eggnog_data_dir: "dataset/eggnog-mapper"          # EggNOG 数据库目录
kofam_ko_list: "dataset/kegg_2026-02-01_ko_dataset/ko_list"    # Kofam KO 列表
kofam_profiles: "dataset/kegg_2026-02-01_ko_dataset/profiles"  # Kofam profiles 目录

# -----------------------------------------------------------------------------
# CPU 资源配置
# -----------------------------------------------------------------------------
eggnog_cpu: 8      # eggnog-mapper 使用的线程数
kofam_cpu: 8       # KofamScan 使用的线程数

# -----------------------------------------------------------------------------
# 过滤阈值配置
# -----------------------------------------------------------------------------
evalue_threshold: 1.0e-5      # E-value 阈值（越小越严格）
bitscore_threshold: 60        # Bit-score 阈值（越大越严格）
min_confidence: "High"        # 最低可信度: High, Medium, Low
require_kegg: true            # 是否要求必须有 KEGG 注释
require_go: false             # 是否要求必须有 GO 注释

# -----------------------------------------------------------------------------
# 样本配置
# -----------------------------------------------------------------------------
# 要分析的样本列表
samples:
  - test_sample_100
  # - sample2
  # - sample3
