# -----------------------------------------------------------------------------
# 执行环境配置
# -----------------------------------------------------------------------------
execution:
  environment: local   # local 或 cluster
  queue: normal        # 集群队列/分区名称

# -----------------------------------------------------------------------------
# 资源配置预设
# -----------------------------------------------------------------------------
resource_presets:
  default:
    mem_gb: 8
    runtime: 60        # 分钟
  high_resource:
    mem_gb: 32
    runtime: 240
  low_resource:
    mem_gb: 4
    runtime: 30
